spring.application.name=nasa_blog

# Default log level for application classes in this package
logging.level.com.github.khatiaturm.nasa_blog=INFO

# Keep framework noise lower than application logs
logging.level.org.springframework=WARN

# Console log format
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] [%logger{36}] - %msg%n

# File logging configuration
logging.file.name=logs/nasa-blog.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%level] [%logger{36}] - %msg%n
