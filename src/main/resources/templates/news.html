<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>News</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="card details-card">
    <p class="success-message" th:if="${successMessage}" th:text="${successMessage}"></p>
    <h1 th:text="${news.title}"></h1>
    <img th:if="${news.imagePath != null}" th:src="@{${news.imagePath}}" alt="news image">
    <p th:text="${news.content}"></p>
</div>

<a href="/">Back</a>

</body>
</html>
