<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>NASA News</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<h1>NASA News</h1>

<img src="/nasa-badge.svg" alt="NASA blog banner" class="hero-image">

<p class="success-message" th:if="${successMessage}" th:text="${successMessage}"></p>
<p class="error" th:if="${errorMessage}" th:text="${errorMessage}"></p>

<a href="/create" class="btn">+ Create News</a>

<div class="container">
    <div class="card" th:each="n : ${newsList}">
        <h2 th:text="${n.title}"></h2>
        <img th:if="${n.imagePath != null}" th:src="@{${n.imagePath}}" alt="image">
        <p th:text="${n.content}"></p>
        <a th:href="@{/news/{id}(id=${n.id})}">Open post</a>
    </div>
</div>

</body>
</html>
