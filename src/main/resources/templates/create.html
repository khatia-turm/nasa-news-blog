<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create News</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<h1>Create NASA News</h1>

<form th:action="@{/create}" th:object="${newsForm}" method="post" enctype="multipart/form-data">

    <label>Title:</label>
    <input type="text" th:field="*{title}">
    <p class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>

    <label>Content:</label>
    <textarea th:field="*{content}"></textarea>
    <p class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>

    <label>Image:</label>
    <input type="file" th:field="*{file}" accept="image/*">
    <p class="error" th:if="${#fields.hasErrors('file')}" th:errors="*{file}"></p>

    <button type="submit">Post</button>

</form>

<a href="/">Back</a>

</body>
</html>
